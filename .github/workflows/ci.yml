name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/java-devops-app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build, Test, SonarQube, OWASP
  # ─────────────────────────────────────────
  build-and-test:
    name: Build, Test & Code Analysis
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube ke liye full history chahiye

      # Step 2: Java 17 setup
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Maven cache (build fast hoga)
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Step 4: Compile
      - name: Compile
        run: mvn clean compile -B

      # Step 5: Unit Tests + JaCoCo Coverage
      - name: Run Tests
        run: mvn test -B

      # Step 6: Test Report Upload
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: target/surefire-reports/

      # Step 7: SonarCloud Analysis
      - name: SonarCloud Analysis
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=ShreyasSangai_java-devops-project \
          -Dsonar.organization=shreyassangai \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
          -B

      # Step 8: OWASP Dependency Check
      - name: OWASP Dependency Check
        if: false
        run: |
         mvn dependency-check:check -B \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DfailBuildOnCVSS=9 || true

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
         name: owasp-report
         path: target/dependency-check-report.html

      # Step 9: OWASP Report Upload
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html

      # Step 10: Build JAR
      - name: Build JAR
        run: mvn package -DskipTests -B

      # Step 11: JAR Upload (CD job ke liye)
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ─────────────────────────────────────────
  # JOB 2: Deploy JAR to Nexus
  # ─────────────────────────────────────────
  deploy-to-nexus:
    name: Deploy JAR to Nexus
    runs-on: ubuntu-latest
    needs: build-and-test  # Job 1 ke baad chalega

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Maven settings.xml banao (Nexus credentials ke liye)
      - name: Configure Maven Settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Deploy JAR to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
        run: mvn deploy -DskipTests -B

  # ─────────────────────────────────────────
  # JOB 3: Docker Build & Push
  # ─────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push to DockerHub
    runs-on: ubuntu-latest
    needs: deploy-to-nexus  # Job 2 ke baad chalega

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # DockerHub login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker Buildx setup (multi-platform ke liye)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image tag set karo (commit SHA + latest)
      - name: Set Image Tag
        id: tag
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/java-devops-app" >> $GITHUB_OUTPUT

      # Docker Build + Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ steps.tag.outputs.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Image tag save karo (CD ke liye)
      - name: Save Image Tag
        run: echo "${{ steps.tag.outputs.IMAGE_TAG }}" > image-tag.txt

      - name: Upload Image Tag
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt

    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
      image_name: ${{ steps.tag.outputs.IMAGE_NAME }}